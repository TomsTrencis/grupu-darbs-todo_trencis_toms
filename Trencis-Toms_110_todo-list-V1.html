<!-- Kas ir localStorage pārlūkprogrammā?
    ATB: localStorage ir īpašība, kas ļauj JavaScript vietnēm un lietotnēm saglabāt atslēgu-vērtību pārus tīmekļa pārlūkprogrammā bez derīguma termiņa.
    
    Atšķirībā no mainīgajiem (let vai const), kuru vērtības pazūd pēc lapas pārlādes (F5), localStorage saglabā datus pārlūkprogrammā bez derīguma termiņa un 
    tie nepazūd pat pēc lapas pārlādes, pārlūka aizvēršanas vai atkārtotas atvēršanas. 
-->
<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Todo List V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="shadow p-4 bg-white rounded" style="width: 100%; max-width: 800px;">
        <h4 class="text-center mb-3">Todo List V2</h4>

        <div class="input-group mb-3">
            <select id="prioritySelect" class="form-select" style="max-width: 120px;">
                <option value="medium">Vidēja</option>
                <option value="low">Zema</option>
                <option value="high">Svarīgi</option>
            </select>

            <input id="taskInput" type="text" class="form-control" placeholder="Ieraksti darbu...">
            <button id="addButton" class="btn btn-primary">Pievienot</button>
        </div>

        <div class="d-flex gap-2 mb-3">
            <input id="searchInput" type="text" class="form-control" placeholder="Meklēt uzdevumu...">
            
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-secondary active" id="visiUzdevumi">Visi</button>
                <button type="button" class="btn btn-outline-secondary" id="aktivieuzdevumi">Aktīvie</button>
                <button type="button" class="btn btn-outline-secondary" id="pabeigtieUzdevumi">Pabeigtie</button>
            </div>
        </div>

        <ul id="taskList" class="list-group"></ul>

        <div id="statusSummary" class="mt-3"></div>
    </div>
</div>

<script>
const input = document.getElementById("taskInput");
const button = document.getElementById("addButton");
const list = document.getElementById("taskList");
const prioritySelect = document.getElementById("prioritySelect");
const searchInput = document.getElementById("searchInput");
const statusSummary = document.getElementById("statusSummary");
let currentFilter = "visiUzdevumi";

function updateSummary() {
    const activeTasks = Array.from(document.querySelectorAll("#taskList li")).filter(li => {
        return !li.querySelector(".task-text").classList.contains("text-decoration-line-through");
    }).length;
    
    if (activeTasks === 0) {
        statusSummary.textContent = "Visi darbi pabeigti!";
    } else {
        statusSummary.textContent = "Atlikuši " + activeTasks + " darbi";
    }
}

function saveTasks() {
    const tasks = [];
    document.querySelectorAll("#taskList li").forEach(li => {
        const text = li.querySelector(".task-text").textContent;
        const done = li.querySelector(".task-text").classList.contains("text-decoration-line-through");
        const priority = li.dataset.priority;
        tasks.push({ text, done, priority });
    });
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function filterTasks(type) {
    currentFilter = type;
    const searchTerm = searchInput.value.toLowerCase();

    document.querySelectorAll(".btn-group .btn").forEach(btn => {
        btn.classList.remove("active");
        if (btn.id === type) {
            btn.classList.add("active");
        }
    });

    const items = document.querySelectorAll("#taskList li");
    items.forEach(function (li) {
        const text = li.querySelector(".task-text").textContent.toLowerCase();
        const isDone = li.querySelector(".task-text").classList.contains("text-decoration-line-through");
        
        const matchesSearch = text.includes(searchTerm);
        let matchesFilter = false;

        if (type === "visiUzdevumi") {
            matchesFilter = true;
        } else if (type === "aktivieuzdevumi") {
            matchesFilter = !isDone;
        } else if (type === "pabeigtieUzdevumi") {
            matchesFilter = isDone;
        }

        if (matchesSearch && matchesFilter) {
            li.style.setProperty("display", "flex", "important");
        } else {
            li.style.setProperty("display", "none", "important");
        }
    });
}

function addTask(text, priority, done = false) {
    const li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between align-items-center";
    li.dataset.priority = priority;

    const badge = document.createElement("span");
    badge.classList.add("badge", "me-2");
    if (priority === "high") {
        badge.textContent = "SVARĪGI";
        badge.classList.add("bg-danger");
    } else if (priority === "medium") {
        badge.textContent = "Vidēja";
        badge.classList.add("bg-warning");
    } else {
        badge.textContent = "Zema";
        badge.classList.add("bg-secondary");
    }

    const textSpan = document.createElement("span");
    textSpan.textContent = text;
    textSpan.className = "task-text flex-grow-1";
    textSpan.style.cursor = "pointer";
    if (done) {
        textSpan.classList.add("text-decoration-line-through");
    }

    textSpan.onclick = function () {
        textSpan.classList.toggle("text-decoration-line-through");
        saveTasks();
        filterTasks(currentFilter);
        updateSummary();
    };

    const left = document.createElement("div");
    left.className = "d-flex align-items-center gap-2";
    left.appendChild(badge);
    left.appendChild(textSpan);

    const deleteButton = document.createElement("button");
    deleteButton.className = "btn btn-outline-danger btn-sm";
    deleteButton.textContent = "Dzēst";

    deleteButton.onclick = function () {
        li.remove();
        saveTasks();
        updateSummary();
    };

    li.appendChild(left);
    li.appendChild(deleteButton);
    list.appendChild(li);

    saveTasks();
    filterTasks(currentFilter);
    updateSummary();
}

function loadTasks() {
    const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    tasks.forEach(task => addTask(task.text, task.priority, task.done));
}

button.onclick = function () {
    const text = input.value.trim();
    const priority = prioritySelect.value;
    if (text === "") return;

    addTask(text, priority);
    input.value = "";
};

input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        button.click();
    }
});

searchInput.addEventListener("input", function () {
    filterTasks(currentFilter);
});

document.getElementById("visiUzdevumi").addEventListener("click", function () {
    filterTasks("visiUzdevumi");
});

document.getElementById("aktivieuzdevumi").addEventListener("click", function () {
    filterTasks("aktivieuzdevumi");
});

document.getElementById("pabeigtieUzdevumi").addEventListener("click", function () {
    filterTasks("pabeigtieUzdevumi");
});

loadTasks();
updateSummary();
</script>

</body>
</html>
